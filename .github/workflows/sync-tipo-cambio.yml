name: Sync Tipo de Cambio (ARI — BCCR)

on:
  schedule:
    # 9:00 AM Costa Rica (UTC-6) = 15:00 UTC
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run sync script
        run: node scripts/sync-tipo-cambio.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID:      ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          HOUSEHOLD_ID:             ${{ secrets.VITE_HOUSEHOLD_ID }}
